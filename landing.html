<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 리터러시 강사 · 은미</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    font-family:'Noto Serif KR', serif;
    background:#000 url('curtain.png') center center / cover no-repeat;
    overflow:hidden;
    cursor:pointer;
    user-select:none;
  }

  /* fallback 이미지 (영상 로드 전 또는 영상 없을 때) */
  .curtain-bg{
    position:fixed; inset:0;
    background: url('curtain.png') center center / cover no-repeat;
    z-index:1;
    animation: subtleZoom 12s ease-in-out infinite alternate;
  }
  @keyframes subtleZoom{
    from{ transform:scale(1); }
    to{ transform:scale(1.06); }
  }

  /* 커튼 영상 */
  .curtain-video{
    position:fixed; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:2;
  }

  /* 루프 튐 페이드 처리 */
  .loop-fade{
    position:fixed; inset:0;
    background:#fff;
    z-index:3;
    opacity:0;
    pointer-events:none;
    transition: opacity .5s ease;
  }
  .loop-fade.show{ opacity:1; }

  /* 빛 효과 */
  .curtain-light{
    position:fixed; inset:0;
    background: radial-gradient(ellipse 60% 80% at 28% 40%,
      rgba(255,245,230,.18) 0%,
      transparent 70%);
    z-index:4;
    animation: lightSway 6s ease-in-out infinite alternate;
  }
  @keyframes lightSway{
    from{ opacity:.6; transform:translateX(-8px); }
    to{ opacity:1; transform:translateX(8px); }
  }

  /* 어두운 오버레이 */
  .veil{
    position:fixed; inset:0;
    background: linear-gradient(
      160deg,
      rgba(10,22,16,.38) 0%,
      rgba(10,22,16,.52) 60%,
      rgba(10,22,16,.72) 100%
    );
    z-index:5;
  }

  /* 중앙 텍스트 */
  .center{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:6;
    text-align:center;
    padding:24px;
  }

  .label{
    font-size:.78rem; letter-spacing:.22em;
    color:rgba(255,255,255,.55);
    margin-bottom:28px;
    opacity:0;
    animation: fadeUp .9s ease forwards .4s;
  }

  .hook{
    color:#fff;
    font-weight:300;
    font-size: clamp(1.7rem, 5.5vw, 3.2rem);
    line-height:1.55;
    letter-spacing:-.01em;
    opacity:0;
    animation: fadeUp 1.1s ease forwards .7s;
  }

  .hook em{
    font-style:normal;
    color:#F2A07B;
    font-weight:400;
  }

  .hint{
    margin-top:52px;
    font-size:.78rem; letter-spacing:.15em;
    color:rgba(255,255,255,.38);
    opacity:0;
    animation: fadeUp .9s ease forwards 1.5s, blink 2.8s ease-in-out infinite 2s;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(18px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes blink{
    0%,100%{ opacity:.38; }
    50%{ opacity:.7; }
  }

  /* 진입 트랜지션 */
  .curtain-bg,
  .curtain-video,
  .curtain-light,
  .veil,
  .center{
    transition: opacity .9s ease;
  }

  body.leaving .curtain-bg,
  body.leaving .curtain-video,
  body.leaving .curtain-light,
  body.leaving .veil,
  body.leaving .center{
    opacity:0;
  }

  @media (prefers-reduced-motion:reduce){
    .curtain-bg{ animation:none; }
    .curtain-light{ animation:none; }
    .hint{ animation: fadeUp .9s ease forwards 1.5s; }
  }
</style>
</head>
<body>

<div class="curtain-bg"></div>

<!-- curtain.mp4 파일을 폴더에 넣으면 자동으로 영상으로 전환됩니다 -->
<video class="curtain-video" id="curtainVideo" autoplay muted playsinline>
  <source src="curtain.mp4" type="video/mp4">
</video>

<div class="loop-fade" id="loopFade"></div>
<div class="curtain-light"></div>
<div class="veil"></div>

<div class="center">
  <p class="label">AI 리터러시 강사 · 은미</p>
  <h1 class="hook">
    <em>딸깍</em> 전에<br>
    뭘 생각해야 하는지,<br>
    그게 시작이에요
  </h1>
  <p class="hint">화면을 클릭하면 시작합니다</p>
</div>

<audio id="bgm" loop preload="auto">
  <source src="Morning_Breeze.mp3" type="audio/mpeg">
</audio>

<script>
  const video = document.getElementById('curtainVideo');
  const loopFade = document.getElementById('loopFade');
  const bgm = document.getElementById('bgm');
  let entered = false;


  // 루프 튐 페이드 처리
  video.addEventListener('timeupdate', ()=>{
    if(!video.duration) return;
    const remaining = video.duration - video.currentTime;
    if(remaining < 0.7){
      loopFade.classList.add('show');
    }
  });
  video.addEventListener('ended', ()=>{
    video.currentTime = 0;
    video.play();
    setTimeout(()=>{ loopFade.classList.remove('show'); }, 500);
  });

  // 클릭시 진입
  document.body.addEventListener('click', ()=>{
    if(entered) return;
    entered = true;

    bgm.volume = 0;
    bgm.play().catch(()=>{});

    let vol = 0;
    const fadeIn = setInterval(()=>{
      vol = Math.min(vol + 0.04, 0.55);
      bgm.volume = vol;
      if(vol >= 0.55) clearInterval(fadeIn);
    }, 80);

    document.body.classList.add('leaving');
    setTimeout(()=>{
      window.location.href = 'index.html';
    }, 950);
  });
</script>

</body>
</html>
